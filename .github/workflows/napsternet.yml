name: NapsternetV File Forwarder

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'napsternet_forwarder.py'
      - '.github/workflows/napsternet.yml'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  forward-napsternet-files:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prevent workflow loop
        run: |
          if [[ "${{ github.actor }}" == "github-actions[bot]" ]]; then
            echo "Workflow triggered by bot. Exiting."
            exit 0
          fi

      - name: Random delay
        run: sleep $((RANDOM % 60 + 10))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --no-cache-dir

      - name: Create required directories
        run: |
          mkdir -p napsternet_files
          touch napsternet_history.json

      - name: Run NapsternetV Forwarder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          python napsternet_forwarder.py 2>&1 | tee run_log.txt
        timeout-minutes: 25
        continue-on-error: false

      - name: Configure Git
        if: success() || failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage changes
        if: success() || failure()
        run: |
          git add napsternet_history.json napsternet_files/ run_log.txt -A || true

      - name: Check for changes
        id: changes
        if: success() || failure()
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git commit -m "📁 NapsternetV update $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"

      - name: Pull latest changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git pull --rebase origin main || true

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin main
