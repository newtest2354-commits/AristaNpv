name: NapsternetV File Forwarder

on:
  schedule:
    - cron: '*/20 * * * *'

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'napsternet_forwarder.py'
      - '.github/workflows/napsternet.yml'
      - 'requirements.txt'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  forward-napsternet-files:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Random delay
        run: sleep $((RANDOM % 120 + 20))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NapsternetV Forwarder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python napsternet_forwarder.py
        timeout-minutes: 15

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage changes
        run: |
          git add napsternet_history.json || true
          git add napsternet_files/ || true
          git add run_log.txt || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git commit -m "📁 Napsternet Update $(date -u '+%Y-%m-%d %H:%M UTC')" || true

      - name: Pull latest changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git pull --rebase origin main || true

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin main
